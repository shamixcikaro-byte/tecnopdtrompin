<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PDT Rompin</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="animation.css">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<script defer src="action.js"></script>
</head>

<body>

<header id="header">

    <div class="header-left">
        <img src="images/logo3.png" class="logo-img">
        <div class="jabatan-name">Pejabat Daerah dan Tanah Rompin</div>
    </div>

    <div id="menu-toggle">☰</div>
</header>

<div id="overlay"></div>

<aside id="mobile-sidebar">
    <div class="sidebar-header">
        <h3>MENU UTAMA</h3>
    </div>

    <ul>
        <li><a href="#utama">Utama</a></li>
        <li><a href="#perkhidmatan">Perkhidmatan</a></li>
        <li><a href="#pengumuman">Pengumuman</a></li>
        <li><a href="#peta">Peta</a></li>
        <li><a href="#faq">FAQ</a></li>
    </ul>
</aside>

<!-- TOP -->
<section class="top-section" id="utama">

    <img src="images/land/sky.png" id="sky">
    <img src="images/land/mountains.png" id="mountains">
    <img src="images/land/cloud.png" id="cloud">

    <div id="text">
        Selamat Datang<br>
        <span>PDT Rompin</span>
    </div>

    <p id="datetime"></p>
    <a href="#sec" id="explore">Lihat Maklumat</a>

</section>

<!-- CONTENT -->
<main id="sec">

<section id="perkhidmatan" class="section">
    <h2>Perkhidmatan</h2>
    <div class="card">Pengurusan Tanah</div>
    <div class="card">Pentadbiran</div>
</section>

<section id="pengumuman" class="section">
    <h2>Pengumuman</h2>
    <div class="card">Pengumuman 1</div>
</section>

<section id="peta" class="section">

    <div class="map-tools">
        <input id="mapSearch" placeholder="Cari lokasi">
        <button onclick="searchLocation()">Cari</button>
    </div>

    <iframe id="map"
    src="https://www.google.com/maps?q=Rompin&output=embed"></iframe>

</section>

<section id="faq" class="section">
    <div class="faq-item">
        <div class="faq-question">Apa itu PDT Rompin?</div>
        <div class="faq-answer">Pejabat Daerah dan Tanah Rompin.</div>
    </div>
</section>

</main>

</body>
</html>
